<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR TV Viewer</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@material/web/": "https://esm.sh/@material/web@1.4.1/"
            }
        }
    </script>
    
    <script type="module">
        import '@material/web/all.js';
    </script>

    <style>
        /* Minimalist Pure AMOLED Black Theme */
        :root {
            --md-sys-color-primary: #ffffff;
            --md-sys-color-primary-container: #1a1a1a;
            --md-sys-color-on-primary-container: #ffffff;
            --md-sys-color-surface: #000000;
            --md-sys-color-on-surface: #E2E2E6;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none;
        }

        html.ar-active, body.ar-active {
            background-color: transparent !important;
            background: transparent !important;
        }
        
        .interactive { pointer-events: auto; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        #ARButton {
            bottom: 48px !important;
            padding: 16px 36px !important;
            border-radius: 50px !important;
            background-color: rgba(20, 20, 20, 0.85) !important;
            color: #ffffff !important;
            font-weight: 500 !important;
            letter-spacing: 0.5px !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(12px) !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
            transition: all 0.3s ease !important;
        }
    </style>
</head>
<body>

    <div id="startup-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black z-50 text-white p-6">
        <span class="material-symbols-outlined text-6xl text-white mb-6 opacity-90">tv_options_edit_channels</span>
        <h1 class="text-4xl font-semibold mb-3 tracking-tight">AR TV Viewer</h1>
        <p class="text-gray-400 text-center max-w-sm mb-12 text-sm">Visualize standard TV sizes in your space.</p>
        <div id="ar-button-container" class="w-full flex justify-center"></div>
    </div>

    <div id="ar-overlay" class="hidden absolute inset-0 z-40 flex flex-col justify-between pointer-events-none">
        
        <div class="p-8 flex justify-between items-start interactive mt-6">
            <div class="bg-black/60 backdrop-blur-xl rounded-[24px] p-5 border border-white/10 shadow-2xl">
                <p class="text-[10px] text-gray-400 uppercase tracking-widest font-semibold mb-1">Active Size</p>
                <div class="text-4xl font-light text-white tracking-tighter"><span id="size-display" class="font-semibold">55</span>"</div>
                <div id="ai-feedback" class="text-xs text-gray-300 mt-3 hidden max-w-[200px] leading-relaxed"></div>
            </div>
            
            <md-fab id="btn-ai" variant="surface" aria-label="Ask AI" style="--md-fab-container-color: rgba(0,0,0,0.6); --md-fab-icon-color: white; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);">
                <md-icon slot="icon">auto_awesome</md-icon>
            </md-fab>
        </div>

        <div class="flex justify-center pointer-events-none mb-auto mt-12">
            <div id="status-badge" class="bg-black/60 backdrop-blur-md px-6 py-3 rounded-full text-white/90 text-sm font-medium border border-white/10 transition-opacity shadow-lg">
                Scan floor slowly...
            </div>
        </div>

        <div class="p-6 interactive pb-12 w-full">
            <div class="bg-black/60 backdrop-blur-2xl rounded-[32px] p-2 flex gap-2 overflow-x-auto hide-scroll border border-white/10 shadow-2xl" id="size-carousel">
            </div>
        </div>
    </div>

    <md-dialog id="ai-modal" class="interactive" style="--md-dialog-container-color: #111114;">
        <div slot="headline" class="text-white">Gemini Auto-Scale</div>
        <form slot="content" id="form-id" method="dialog">
            <p class="text-sm text-gray-400 mb-6 mt-2">Enter your approximate viewing distance (e.g., "9 feet").</p>
            <md-outlined-text-field id="distance-input" label="Viewing Distance" class="w-full" style="--md-outlined-text-field-container-shape: 16px;"></md-outlined-text-field>
        </form>
        <div slot="actions">
            <md-text-button id="btn-cancel-ai">Cancel</md-text-button>
            <md-filled-button id="btn-submit-ai" style="--md-filled-button-container-color: #ffffff; --md-filled-button-label-text-color: #000000;">Analyze Space</md-filled-button>
        </div>
    </md-dialog>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        const apiKey = "AIzaSyCDUGqVt6U0JCqGOMof8vsT3ioEe7Jy2jw"; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`;

        const SIZES = [43, 50, 55, 65, 75, 85];
        let currentSize = 55;
        let tvPlaced = false;

        let scene, camera, renderer;
        let reticle, tvGroup, screenMesh;
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        initAR();
        buildUI();

        function initAR() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setClearColor(0x000000, 0);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(0, 2, 0);
            scene.add(dirLight);

            const arButton = ARButton.createButton(renderer, {
                requiredFeatures: ['hit-test', 'dom-overlay'],
                domOverlay: { root: document.body }
            });
            document.getElementById('ar-button-container').appendChild(arButton);

            renderer.xr.addEventListener('sessionstart', async () => {
                document.documentElement.classList.add('ar-active');
                document.body.classList.add('ar-active');
                document.getElementById('startup-screen').style.display = 'none';
                document.getElementById('ar-overlay').style.display = 'flex';
                document.getElementById('ar-overlay').classList.remove('hidden');

                // --- 120FPS UNLOCK LOGIC ---
                const session = renderer.xr.getSession();
                if (session.supportedFrameRates) {
                    try {
                        const rates = session.supportedFrameRates;
                        const maxRate = Math.max(...rates);
                        if (maxRate > 60) {
                            await session.updateTargetFrameRate(maxRate);
                            console.log("WebXR boosted to: " + maxRate + " FPS");
                        }
                    } catch(e) {
                        console.warn("Hardware locked framerate", e);
                    }
                }
            });

            renderer.xr.addEventListener('sessionend', () => {
                document.documentElement.classList.remove('ar-active');
                document.body.classList.remove('ar-active');
                document.getElementById('startup-screen').style.display = 'flex';
                document.getElementById('ar-overlay').style.display = 'none';
                resetARState();
            });

            const controller = renderer.xr.getController(0);
            controller.addEventListener('select', onScreenTap);
            scene.add(controller);

            create3DObjects();
            renderer.setAnimationLoop(renderLoop);
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function create3DObjects() {
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            tvGroup = new THREE.Group();
            tvGroup.visible = false;
            scene.add(tvGroup);

            screenMesh = new THREE.Mesh(
                new THREE.BoxGeometry(1, 1, 0.05),
                new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.8 })
            );
            tvGroup.add(screenMesh);

            updateTVGeometry(currentSize);
        }

        function updateTVGeometry(inches) {
            currentSize = inches;
            const aspect = 16 / 9;
            const diagMeters = inches * 0.0254; 
            const height = diagMeters / Math.sqrt(aspect * aspect + 1);
            const width = height * aspect;

            screenMesh.geometry.dispose();
            screenMesh.geometry = new THREE.BoxGeometry(width, height, 0.05);
            screenMesh.position.y = height / 2;
            
            document.getElementById('size-display').innerText = inches;
            document.querySelectorAll('.size-btn').forEach(btn => {
                btn.style.setProperty('--md-sys-color-secondary-container', 
                    parseInt(btn.dataset.size) === inches ? '#ffffff' : 'transparent');
                btn.style.setProperty('--md-sys-color-on-secondary-container', 
                    parseInt(btn.dataset.size) === inches ? '#000000' : '#ffffff');
            });
        }

        function onScreenTap() {
            if (reticle.visible) {
                tvGroup.position.setFromMatrixPosition(reticle.matrix);
                const cameraPos = new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
                tvGroup.rotation.y = Math.atan2(cameraPos.x - tvGroup.position.x, cameraPos.z - tvGroup.position.z);
                
                tvGroup.visible = true;
                tvPlaced = true;
                updateStatus("TV Placed. Tap elsewhere to move.", 3000);
            }
        }

        function resetARState() {
            tvPlaced = false;
            tvGroup.visible = false;
            document.getElementById('ai-modal').close();
            updateStatus("Scan floor slowly...");
        }

        function buildUI() {
            const carousel = document.getElementById('size-carousel');
            SIZES.forEach(size => {
                const btn = document.createElement('md-filled-tonal-button');
                btn.className = 'size-btn flex-shrink-0 mx-1';
                btn.dataset.size = size;
                btn.innerText = `${size}"`;
                btn.style.borderRadius = "20px";
                btn.onclick = () => {
                    updateTVGeometry(size);
                    document.getElementById('ai-feedback').classList.add('hidden');
                };
                carousel.appendChild(btn);
            });
            updateTVGeometry(currentSize);

            const modal = document.getElementById('ai-modal');
            document.getElementById('btn-ai').onclick = () => modal.show();
            document.getElementById('btn-cancel-ai').onclick = () => modal.close();
            document.getElementById('btn-submit-ai').onclick = handleAICall;
        }

        function updateStatus(text, timeout = 0) {
            const badge = document.getElementById('status-badge');
            badge.innerText = text;
            badge.style.opacity = '1';
            if (timeout > 0) {
                setTimeout(() => badge.style.opacity = '0', timeout);
            }
        }

        async function handleAICall() {
            const inputEl = document.getElementById('distance-input');
            const distance = inputEl.value.trim();
            if (!distance) return;

            const submitBtn = document.getElementById('btn-submit-ai');
            submitBtn.innerText = "Thinking...";
            submitBtn.disabled = true;

            const prompt = `User viewing distance is "${distance}". Pick the optimal TV size from this list: ${SIZES.join(', ')}. Return valid JSON: {"size": number, "reason": "short explanation"}`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                let rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                rawText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
                
                const result = JSON.parse(rawText);

                let finalSize = parseInt(result.size);
                if (!SIZES.includes(finalSize)) {
                    finalSize = SIZES.reduce((prev, curr) => Math.abs(curr - finalSize) < Math.abs(prev - finalSize) ? curr : prev);
                }

                updateTVGeometry(finalSize);
                
                const feedbackEl = document.getElementById('ai-feedback');
                feedbackEl.innerText = result.reason;
                feedbackEl.classList.remove('hidden');
                
                document.getElementById('ai-modal').close();
                inputEl.value = "";
                
                if (!tvPlaced) updateStatus(`AI suggests ${finalSize}". Tap reticle to place!`);

            } catch (err) {
                console.error("AI Error:", err);
                updateStatus("AI Error. Check console.", 3000);
                document.getElementById('ai-modal').close();
            } finally {
                submitBtn.innerText = "Analyze Space";
                submitBtn.disabled = false;
            }
        }

        function renderLoop(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(refSpace => {
                        session.requestHitTestSource({ space: refSpace }).then(source => {
                            hitTestSource = source;
                        });
                    });
                    session.addEventListener('end', () => {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                        if (!tvPlaced) updateStatus("Surface found! Tap to place.");
                    } else {
                        reticle.visible = false;
                        if (!tvPlaced) updateStatus("Scan floor slowly...");
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
